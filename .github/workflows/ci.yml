name: CI

on:
  # No push:main trigger. Under this repo's PR-only main (strict up-to-date + squash
  # merge), the tree that lands on main is byte-identical to the branch tip the Quality
  # gate just proved, so a post-merge push run would re-prove the same tree for nothing.
  # Dropped to match the private upstream boilerplate (tag v0.6.2).
  # Guard: a direct-to-main fork (no PR flow) must restore a push trigger here, or CI
  # never runs (cf. the audit job's origin/main..HEAD direct-to-main caveat below).
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Boot smoke (server e2e)
        run: pnpm test:e2e

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Scan only the PR's own commits (origin/main..HEAD): not full history (avoids
      # legacy-secret noise on branches we cannot safely rewrite) and not just the working
      # tree (catches a secret added then deleted within the same PR). fetch-depth: 0 above
      # makes origin/main available as a ref. gitleaks exits non-zero on a hit, failing the job.
      # GIT_CONFIG_* marks the workspace safe: the runner owns it as uid 1001, but git runs as
      # root inside the container, which otherwise aborts the scan with "dubious ownership".
      # This origin/main..HEAD range is only meaningful under PR flow; a direct-to-main fork has
      # an empty range on a push event and must swap the range for a push-appropriate one.
      - name: Scan PR commit range for secrets
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo \
            --log-opts="origin/main..HEAD" \
            --redact \
            --no-banner

  quality-gate:
    name: Quality gate
    needs: [verify, e2e, audit]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all workers to succeed
        run: |
          verify='${{ needs.verify.result }}'
          e2e='${{ needs.e2e.result }}'
          audit='${{ needs.audit.result }}'
          echo "verify: $verify"
          echo "e2e:    $e2e"
          echo "audit:  $audit"
          if [[ "$verify" == "success" && "$e2e" == "success" && "$audit" == "success" ]]; then
            echo "All worker jobs succeeded."
          else
            echo "::error::Quality gate failed - a worker job did not report success."
            exit 1
          fi

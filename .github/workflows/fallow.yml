name: Fallow

# Advisory (NOT a required check): Fallow runs diff-scoped against the PR base, so
# only dead code / duplication / complexity *introduced by the PR* affects its
# verdict - the scaffold's baseline false-positives (intentionally-unused exports,
# reflection-only deps) are reported as inherited and never fail. It is deliberately
# kept out of the required `Quality gate` job. See docs/adr/0002 (reconciliation
# pending) and .fallowrc.json for the entry-point / dependency suppressions.

on:
  # Advisory checks may be path-filtered at the workflow level; a *required* check
  # must not be (a skipped required check reports as pending and blocks the merge).
  # Fallow is advisory (see the header) and only audits source dead-code /
  # duplication, so a PR touching none of its analysis inputs has nothing to say.
  # The paths below are this repo's actual Fallow inputs: the source dirs plus the
  # layout / import-resolution / dependency files that shift its verdict, plus this
  # workflow itself. (Mirrors the private upstream boilerplate's v0.6.2 filter;
  # .fallowrc.json is in that list but omitted here until it exists in the tree.)
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/fallow.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: fallow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Diff-scoped audit needs history to diff against origin/main.
          fetch-depth: 0

      - name: Fallow diff-scoped audit
        uses: fallow-rs/fallow@32b3f89fe28c286c85a6b0aed4ec5be120f54da6 # v3.6.0
        with:
          version: "3.6.0"
          changed-since: origin/main
          # Truly advisory: report findings as PR annotations without failing the
          # job, so a false-positive never red-Xes a PR. Promote to a required gate
          # (fail-on-issues + add to the Quality gate) once the signal is trusted.
          fail-on-issues: false
